<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Mini Metro</title>
  <link rel="stylesheet" href="style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
</head>
<body>
  <div id="app">
    <canvas id="game"></canvas>
    <div id="hud">
      <div id="week">Week <span id="week-num">1</span></div>
      <div id="lines-left">Lines: <span id="line-count">3</span></div>
      <div id="pause-hint">Space to pause</div>
    </div>
    <div id="overlay" class="hidden">
      <h1 id="overlay-title">Mini Metro</h1>
      <p id="overlay-msg">Drag between stations to build lines.<br>Keep passengers moving!</p>
      <button id="start-btn">Start</button>
    </div>
  </div>
  <script type="module" src="src/main.js"></script>
</body>
</html>
