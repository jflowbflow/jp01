<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Mobile Metro</title>
  </head>
  <body>
    <main id="app">
      <canvas id="game-canvas" aria-label="Mobile metro game map"></canvas>
      <section class="hud" aria-live="polite">
        <div class="status-card">
          <span id="station-count">0 stations</span>
          <span id="route-count">0 linked</span>
          <span id="game-status">running</span>
        </div>
        <p id="hint-text">Tap stations to add them to the metro line. New stations spawn automatically.</p>
      </section>
      <nav class="toolbar" aria-label="Game toolbar">
        <button id="pause-toggle" class="tool-button primary" type="button" aria-pressed="false">
          Pause
        </button>
        <button id="clear-line" class="tool-button" type="button">Clear line</button>
      </nav>
    </main>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
